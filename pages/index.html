<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Dom</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
        <div class="container">
        <header>
            <div class="headding-fname">
                <h1>My Daily Tasks</h1> 
                <input type="text" id="input-fname" placeholder="Add Your Full Name">
                <button id="themeToggleBtn" class="theme-toggle">
                    <svg class="sun-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://w3.org"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <svg class="moon-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://w3.org"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
            <div class="form-containe" id="task-form">
                <form action="" id="task-form">
                    <input type="text" id="task-input" placeholder="What are your tasks for today?">
                    <input type="submit" id="task-submit" value="Add">
                </form>
                <button type="submit" id="clearAllBtn">Clear</button>

            </div>
        </header>
        <section class="task-stats">
            <div class="stat-box">
                <span class="stat-label T-colorstat-title">Total Tasks:</span>
                <span id="total" class="stat-count T-colorstat">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label C-colorstat-title">Completed:</span>
                <span id="completed-count" class="stat-count C-colorstat">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label I-colorstat-title">Incomplete:</span>
                <span id="incomplete-count" class="stat-count I-colorstat">0</span>
            </div>
        </section>
        <main>
            <section class="task-list">
                <div id="tasks">
                </div>   
            </section>
        </main>
    </div>
    <script src="../javascript/javascript.js"></script>
</body>
</html>
